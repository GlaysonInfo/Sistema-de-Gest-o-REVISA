openapi: 3.0.3
info:
  title: REVISA Platform API
  version: 1.0.0
  description: >-
    API consolidada da plataforma REVISA para gestão institucional,
    captação territorial, operação de polos, gabinete, dashboards,
    governança e privacidade.
servers:
  - url: https://api.revisa.local/api/v1
    description: Local
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Organizations
  - name: Vereadores
  - name: Teams
  - name: Persons
  - name: Consents
  - name: ContactsCapture
  - name: Polos
  - name: Demands
  - name: Tasks
  - name: Events
  - name: Dashboards
  - name: Reports
  - name: Geo
  - name: Audit
  - name: Privacy
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login do usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login efetuado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renova token de acesso
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout do usuário
      responses:
        '204':
          description: Logout efetuado
  /auth/me:
    get:
      tags: [Auth]
      summary: Retorna o usuário autenticado
      responses:
        '200':
          description: Usuário atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users:
    get:
      tags: [Users]
      summary: Lista usuários
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
    post:
      tags: [Users]
      summary: Cria usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags: [Users]
      summary: Detalha usuário
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [Users]
      summary: Atualiza usuário
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}/roles:
    post:
      tags: [Users]
      summary: Vincula papéis ao usuário
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRolesAssignRequest'
      responses:
        '204':
          description: Papéis vinculados

  /users/{id}/scopes:
    post:
      tags: [Users]
      summary: Vincula escopos ao usuário
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserScopesAssignRequest'
      responses:
        '204':
          description: Escopos vinculados

  /organizations:
    get:
      tags: [Organizations]
      summary: Lista organizações
      responses:
        '200':
          description: Lista de organizações
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
    post:
      tags: [Organizations]
      summary: Cria organização
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        '201':
          description: Organização criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  /organizations/{id}:
    get:
      tags: [Organizations]
      summary: Detalha organização
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Organização
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    patch:
      tags: [Organizations]
      summary: Atualiza organização
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
      responses:
        '200':
          description: Organização atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  /vereadores:
    get:
      tags: [Vereadores]
      summary: Lista vereadores
      responses:
        '200':
          description: Lista de vereadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vereador'
    post:
      tags: [Vereadores]
      summary: Cria vereador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VereadorCreateRequest'
      responses:
        '201':
          description: Vereador criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vereador'

  /teams:
    get:
      tags: [Teams]
      summary: Lista equipes
      responses:
        '200':
          description: Lista de equipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
    post:
      tags: [Teams]
      summary: Cria equipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
      responses:
        '201':
          description: Equipe criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

  /persons:
    get:
      tags: [Persons]
      summary: Lista pessoas
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: cpf
          schema: { type: string }
        - in: query
          name: phone
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Lista de pessoas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Person'
    post:
      tags: [Persons]
      summary: Cria pessoa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreateRequest'
      responses:
        '201':
          description: Pessoa criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'

  /persons/{id}:
    get:
      tags: [Persons]
      summary: Detalha pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Pessoa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
    patch:
      tags: [Persons]
      summary: Atualiza pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonUpdateRequest'
      responses:
        '200':
          description: Pessoa atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'

  /persons/{id}/addresses:
    get:
      tags: [Persons]
      summary: Lista enderecos da pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lista de enderecos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
    post:
      tags: [Persons]
      summary: Adiciona endereco da pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressCreateRequest'
      responses:
        '201':
          description: Endereco criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'

  /persons/{id}/consents:
    get:
      tags: [Consents]
      summary: Lista consentimentos da pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lista de consentimentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Consent'
    post:
      tags: [Consents]
      summary: Registra consentimento da pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonConsentCreateRequest'
      responses:
        '201':
          description: Consentimento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consent'

  /persons/{id}/links:
    get:
      tags: [Persons]
      summary: Lista vinculos contextuais da pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lista de vinculos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonLink'
    post:
      tags: [Persons]
      summary: Cria vínculo contextual da pessoa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonLinkCreateRequest'
      responses:
        '201':
          description: Vínculo criado

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonLink'

  /consents:
    get:
      tags: [Consents]
      summary: Lista consentimentos
      parameters:
        - in: query
          name: person_id
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lista de consentimentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Consent'
    post:
      tags: [Consents]
      summary: Registra consentimento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentCreateRequest'
      responses:
        '201':
          description: Consentimento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consent'

  /consents/{id}/revoke:
    post:
      tags: [Consents]
      summary: Revoga consentimento
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Consentimento revogado

  /contacts-capture:
    get:
      tags: [ContactsCapture]
      parameters:
        - in: query
          name: capture_status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      summary: Lista captações territoriais
      responses:
        '200':
          description: Lista de captações
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactCapture'
    post:
      tags: [ContactsCapture]
      summary: Cria captação territorial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCaptureCreateRequest'
      responses:
        '201':
          description: Captação criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCapture'

  /contacts-capture/{id}:
    get:
      tags: [ContactsCapture]
      summary: Detalha captacao territorial
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Captacao territorial
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCapture'

  /contacts-capture/{id}/classify:
    post:
      tags: [ContactsCapture]
      summary: Classifica ou reclassifica captação
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCaptureClassifyRequest'
      responses:
        '200':
          description: Captação atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCapture'

  /contacts-capture/{id}/convert-demand:
    post:
      tags: [ContactsCapture]
      summary: Converte captacao em pessoa e demanda
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCaptureConvertDemandRequest'
      responses:
        '201':
          description: Demanda criada a partir da captacao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCaptureConvertDemandResponse'

  /contacts-capture/{id}/forward-to-polo:
    post:
      tags: [ContactsCapture]
      summary: Encaminha captação ao polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCaptureForwardRequest'
      responses:
        '204':
          description: Encaminhamento efetuado

  /contacts-capture/{id}/convert-beneficiary:
    post:
      tags: [ContactsCapture]
      summary: Converte captação em beneficiário do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCaptureConvertRequest'
      responses:
        '201':
          description: Beneficiário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoloBeneficiary'

  /polos:
    get:
      tags: [Polos]
      summary: Lista polos
      responses:
        '200':
          description: Lista de polos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Polo'
    post:
      tags: [Polos]
      summary: Cria polo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoloCreateRequest'
      responses:
        '201':
          description: Polo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Polo'

  /polos/{id}:
    get:
      tags: [Polos]
      summary: Detalha polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Polo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Polo'
    patch:
      tags: [Polos]
      summary: Atualiza polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoloUpdateRequest'
      responses:
        '200':
          description: Polo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Polo'

  /polos/{id}/beneficiarios:
    get:
      tags: [Polos]
      summary: Lista beneficiários do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: Lista de beneficiários
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PoloBeneficiary'
    post:
      tags: [Polos]
      summary: Vincula beneficiário ao polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoloBeneficiaryCreateRequest'
      responses:
        '201':
          description: Beneficiário vinculado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoloBeneficiary'

  /polos/{id}/beneficiarios/{beneficiario_id}:
    get:
      tags: [Polos]
      summary: Detalha beneficiario do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: beneficiario_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Beneficiario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoloBeneficiary'
    patch:
      tags: [Polos]
      summary: Atualiza beneficiario do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: beneficiario_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoloBeneficiaryUpdateRequest'
      responses:
        '200':
          description: Beneficiario atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoloBeneficiary'

  /polos/{id}/modalidades:
    get:
      tags: [Polos]
      summary: Lista modalidades do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: query
          name: active
          schema: { type: boolean }
      responses:
        '200':
          description: Lista de modalidades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Modality'
    post:
      tags: [Polos]
      summary: Cadastra modalidade do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModalityCreateRequest'
      responses:
        '201':
          description: Modalidade cadastrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Modality'

  /polos/{id}/modalidades/{modalidade_id}:
    get:
      tags: [Polos]
      summary: Detalha modalidade do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: modalidade_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Modalidade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Modality'
    patch:
      tags: [Polos]
      summary: Atualiza modalidade do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: modalidade_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModalityUpdateRequest'
      responses:
        '200':
          description: Modalidade atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Modality'

  /polos/{id}/monthly-reports:
    get:
      tags: [Polos]
      summary: Lista relatorios mensais do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: Lista de relatorios mensais
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonthlyReport'
    post:
      tags: [Polos]
      summary: Envia relatorio mensal do polo para REVISA
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonthlyReportCreateRequest'
      responses:
        '201':
          description: Relatorio mensal enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReport'

  /polos/{id}/monthly-reports/preview:
    post:
      tags: [Polos]
      summary: Gera minuta textual do relatorio mensal
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonthlyReportBase'
      responses:
        '200':
          description: Minuta textual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReportPreview'

  /polos/{id}/monthly-reports/{report_id}:
    get:
      tags: [Polos]
      summary: Detalha relatorio mensal do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: report_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Relatorio mensal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReport'

  /polos/{id}/monthly-reports/{report_id}/attachments:
    post:
      tags: [Polos]
      summary: Envia anexos do relatorio mensal
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: path
          name: report_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Relatorio mensal atualizado com anexos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReport'

  /polos/{id}/frequencias:
    get:
      tags: [Polos]
      summary: Lista frequências do polo
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: query
          name: beneficiario_id
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lista de frequências
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
    post:
      tags: [Polos]
      summary: Registra frequência
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCreateRequest'
      responses:
        '201':
          description: Frequência registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'

  /polos/{id}/frequencias/{frequencia_id}:
    get:
      tags: [Polos]
      summary: Detalha frequencia do polo
