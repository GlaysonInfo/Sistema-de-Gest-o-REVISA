components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      schema:
        type: integer
        default: 1
    PageSize:
      in: query
      name: page_size
      schema:
        type: integer
        default: 20
  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
        code:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer }
    User:
      type: object
      required: [id, username, email, status]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        status: { type: string }
        roles:
          type: array
          items: { type: string }
    UserCreateRequest:
      type: object
      required: [username, email, password]
      properties:
        person_id: { type: string, format: uuid, nullable: true }
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string }
    UserUpdateRequest:
      type: object
      properties:
        email: { type: string, format: email, nullable: true }
        status: { type: string, nullable: true }
        must_reset_password: { type: boolean, nullable: true }
    UserRolesAssignRequest:
      type: object
      required: [role_codes]
      properties:
        role_codes:
          type: array
          items: { type: string }
    UserScopesAssignRequest:
      type: object
      required: [scopes]
      properties:
        scopes:
          type: array
          items:
            type: object
            required: [scope_type, scope_ref_id]
            properties:
              scope_type: { type: string }
              scope_ref_id: { type: string, format: uuid }
    PaginatedUsersResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
    Organization:
      type: object
      required: [id, type, name, active]
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        name: { type: string }
        legal_name: { type: string, nullable: true }
        document_number: { type: string, nullable: true }
        parent_organization_id: { type: string, format: uuid, nullable: true }
        active: { type: boolean }
    OrganizationCreateRequest:
      type: object
      required: [type, name]
      properties:
        type: { type: string }
        name: { type: string }
        legal_name: { type: string, nullable: true }
        document_number: { type: string, nullable: true }
        parent_organization_id: { type: string, format: uuid, nullable: true }
    OrganizationUpdateRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        legal_name: { type: string, nullable: true }
        active: { type: boolean, nullable: true }
    Vereador:
      type: object
      required: [id, person_id, organization_id, active]
      properties:
        id: { type: string, format: uuid }
        person_id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        active: { type: boolean }
    VereadorCreateRequest:
      type: object
      required: [person_id, organization_id]
      properties:
        person_id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
    Team:
      type: object
      required: [id, organization_id, name, team_type, active]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string }
        team_type: { type: string }
        active: { type: boolean }
    TeamCreateRequest:
      type: object
      required: [organization_id, name, team_type]
      properties:
        organization_id: { type: string, format: uuid }
        name: { type: string }
        team_type: { type: string }
    Person:
      type: object
      required: [id, full_name]
      properties:
        id: { type: string, format: uuid }
        full_name: { type: string }
        social_name: { type: string, nullable: true }
        cpf: { type: string, nullable: true }
        birth_date: { type: string, format: date, nullable: true }
        phone: { type: string, nullable: true }
        secondary_phone: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        gender: { type: string, nullable: true }
        notes: { type: string, nullable: true }
    PersonCreateRequest:
      type: object
